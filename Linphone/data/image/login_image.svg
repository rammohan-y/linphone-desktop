<svg width="395" height="350" viewBox="0 0 395 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="197.5" cy="175" r="140" fill="#EDE4F7" opacity="0.5"/>

  <!-- Phone device outline -->
  <rect x="130" y="40" width="135" height="250" rx="20" fill="#6C3FBF" opacity="0.1" stroke="#6C3FBF" stroke-width="3"/>
  <rect x="170" y="52" width="55" height="6" rx="3" fill="#6C3FBF" opacity="0.3"/>

  <!-- Waveform bars on phone screen -->
  <rect x="153" y="130" width="10" height="50" rx="5" fill="#6C3FBF" opacity="0.6"/>
  <rect x="170" y="110" width="10" height="90" rx="5" fill="#6C3FBF" opacity="0.8"/>
  <rect x="187" y="95" width="10" height="120" rx="5" fill="#6C3FBF"/>
  <rect x="204" y="115" width="10" height="80" rx="5" fill="#6C3FBF" opacity="0.8"/>
  <rect x="221" y="125" width="10" height="60" rx="5" fill="#6C3FBF" opacity="0.6"/>
  <rect x="238" y="135" width="10" height="40" rx="5" fill="#6C3FBF" opacity="0.4"/>

  <!-- Magnifying glass -->
  <circle cx="300" cy="100" r="38" stroke="#4CAF50" stroke-width="6" fill="white" fill-opacity="0.8"/>
  <line x1="328" y1="128" x2="352" y2="154" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/>

  <!-- Check marks inside magnifier -->
  <polyline points="282,100 292,110 318,85" stroke="#4CAF50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Signal waves from phone -->
  <path d="M265 155 Q280 145 275 130" stroke="#6C3FBF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M270 165 Q290 150 283 128" stroke="#6C3FBF" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M275 175 Q300 155 291 126" stroke="#6C3FBF" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- AI badge -->
  <rect x="85" y="95" width="40" height="24" rx="12" fill="#4CAF50"/>
  <text x="105" y="112" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">AI</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="200" r="4" fill="#6C3FBF" opacity="0.2"/>
  <circle cx="90" cy="220" r="3" fill="#6C3FBF" opacity="0.15"/>
  <circle cx="320" cy="210" r="4" fill="#4CAF50" opacity="0.2"/>
  <circle cx="330" cy="190" r="3" fill="#4CAF50" opacity="0.15"/>
  <circle cx="110" cy="70" r="3" fill="#6C3FBF" opacity="0.2"/>
  <circle cx="310" cy="250" r="3" fill="#6C3FBF" opacity="0.15"/>

  <!-- Bottom text area -->
  <text x="197.5" y="320" text-anchor="middle" fill="#6C3FBF" font-family="sans-serif" font-size="16" font-weight="600" opacity="0.7">AI Call Verification</text>
</svg>
