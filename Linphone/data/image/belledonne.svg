<svg width="1512" height="108" viewBox="0 0 1512 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGrad" x1="0" y1="0" x2="0" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0D1A"/>
      <stop offset="0.5" stop-color="#110E24"/>
      <stop offset="1" stop-color="#1A1040"/>
    </linearGradient>

    <!-- Milky way wide glow -->
    <radialGradient id="milkyWide" cx="756" cy="58" rx="700" ry="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B6CC1" stop-opacity="0.6"/>
      <stop offset="0.4" stop-color="#6C3FBF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#6C3FBF" stop-opacity="0"/>
    </radialGradient>

    <!-- Galaxy disc -->
    <radialGradient id="galaxyDisc" cx="756" cy="56" rx="350" ry="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4C2ED" stop-opacity="0.8"/>
      <stop offset="0.3" stop-color="#B89CE3" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#8B6CC1" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#6C3FBF" stop-opacity="0"/>
    </radialGradient>

    <!-- Galaxy bright core -->
