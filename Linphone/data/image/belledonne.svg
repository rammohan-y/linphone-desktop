      <stop offset="0" stop-color="#D4C2ED" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#D4C2ED" stop-opacity="0"/>
    </radialGradient>

    <!-- Nebula dust right -->
    <radialGradient id="nebulaR" cx="1200" cy="60" rx="200" ry="35" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B6CC1" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8B6CC1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep space background -->
