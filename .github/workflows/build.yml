name: Build

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      BUILD_TYPE: RelWithDebInfo

    steps:
      - uses: actions/checkout@v4

      - name: Restore submodule cache
        uses: actions/cache/restore@v4
        with:
          path: |
            external/
            .git/modules/
          key: submodules-linux-${{ hashFiles('.gitmodules') }}
          restore-keys: submodules-linux-

      - name: Initialize submodules
        run: ./init-submodules.sh

      - name: Save submodule cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            external/
            .git/modules/
          key: submodules-linux-${{ hashFiles('.gitmodules') }}-${{ github.run_id }}

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo cp -r ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git pkg-config \
            ninja-build nasm yasm doxygen meson autoconf libtool-bin \
            libgl1-mesa-dev libglu1-mesa-dev libegl1-mesa-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev libudev-dev \
            libv4l-dev libasound2-dev libpulse-dev libglew-dev libxinerama-dev \
            libxrandr-dev libxcursor-dev libxi-dev libxext-dev libxfixes-dev \
            libwayland-dev libdbus-1-dev
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install Python modules
        run: |
          python3 -m pip install --force-reinstall pystache six
          python3 -c "import pystache; import six; print('Python modules OK')"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtshadertools qtwebsockets qtnetworkauth'
          cache: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-${{ github.ref }}
          restore-keys: linux-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel $(nproc) --config ${{ env.BUILD_TYPE }}

      - name: Install
        run: cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: callforge-linux
          path: build/OUTPUT/

  build-macos:
    name: macOS
    runs-on: macos-14
    timeout-minutes: 180

    env:
      BUILD_TYPE: RelWithDebInfo

    steps:
      - uses: actions/checkout@v4

      - name: Restore submodule cache
        uses: actions/cache/restore@v4
        with:
          path: |
            external/
            .git/modules/
          key: submodules-macos-${{ hashFiles('.gitmodules') }}
          restore-keys: submodules-macos-

      - name: Initialize submodules
        run: ./init-submodules.sh

      - name: Save submodule cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            external/
            .git/modules/
          key: submodules-macos-${{ hashFiles('.gitmodules') }}-${{ github.run_id }}

      - name: Install system dependencies
        run: |
          brew install cmake ninja nasm yasm doxygen meson autoconf automake libtool pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python modules
        run: |
          python3 -m pip install --break-system-packages --force-reinstall pystache six
          python3 -c "import pystache; import six; print('Python modules OK')"
          which python3

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: 'desktop'
          host: 'mac'
          arch: 'clang_64'
          modules: 'qtshadertools qtwebsockets qtnetworkauth'
          cache: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-${{ github.ref }}
          restore-keys: macos-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.3 \
            -DCMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu) \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_PQCRYPTO=OFF

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu) --config ${{ env.BUILD_TYPE }}

      - name: Install
        run: cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: callforge-macos
          path: build/OUTPUT/
